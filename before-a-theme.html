<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme II</title>
    <link rel="stylesheet" href="css/style-theme-2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<style>
    *{
    padding: 0px;
    margin: 0px;
}

/* GRID */

  /* Grid Content */
  .content-grid {
    display: grid;
    gap: 10px;
  }
  
 


  .grid-container {
    display: grid;
    grid-template-columns: 200px 300px; /* First column 200px, second column 300px */

    
  }
  
  .grid-item-1 {
    padding:10px;
    text-align: center;  
  }
  
  .grid-item-2 {
    padding:10px;
    text-align: left;  
  }
  
  /* Mobile First - 1 column for all rows */
  .row-1, .row-2, .row-3, .row-4 {
    display: grid;
   
    
   
  }
  
  /* Desktop View */
  @media screen and (min-width: 768px) {
  
    /* 1 column, 1 row (remains the same) */
    .row-1 {
        grid-template-columns: 1fr;
       
    }
  
    /* 2 columns, 1 row */
    .row-2 {
        grid-template-columns: 1fr 1fr;
        
        
    }
  
    /* 3 columns, 1 row */
    .row-3 {
        grid-template-columns: 1fr 1fr 1fr;
       
    }
  
    /* 4 columns, 1 row */
    .row-4 {
        grid-template-columns: 1fr 1fr 1fr 1fr;
       
    }
  
    /* 5 columns, 1 row */
    .row-5 {
      grid-template-columns: 1fr 2fr 1fr 1fr;
     
  }

      /*6 columns, 1 row */
      .row-6 {
        grid-template-columns: 1fr 3fr 1fr;
       
    }

        /*6 columns, 1 row */
        .row-7 {
          grid-template-columns: 1fr 2fr 2fr 1fr;
         
      }

       /*6 columns, 1 row */
       .row-8 {
        grid-template-columns: 2fr 2fr;
       
    }


  }
  
  
  .grid-item img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
  }



  /* Navbar */



.topnav {
    overflow: hidden;
    background-color: #333;
  }
  
  .topnav a {
    float: left;
    display: block;
    color: #f2f2f2;
    text-align: center;
    padding: 14px 16px;
    text-decoration: none;
    font-size: 17px;
  }
  
  .topnav a:hover {
    background-color: #ddd;
    color: black;
  }
  
  .topnav a.active {
    background-color: #04AA6D;
    color: white;
  }
  
  .topnav .icon {
    display: none;
  }
  
  @media screen and (max-width: 600px) {
    .topnav a:not(:first-child) {display: none;}
    .topnav a.icon {
      float: right;
      display: block;
    }
  }
  
  @media screen and (max-width: 600px) {
    .topnav.responsive {position: relative;}
    .topnav.responsive .icon {
      position: absolute;
      right: 0;
      top: 0;
    }
    .topnav.responsive a {
      float: none;
      display: block;
      text-align: left;
    }
  }









/* Footer */

  .footer {
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100%;
    background-color: red;
    color: white;
    text-align: center;
 }
</style>
<body>

<div class="topnav" id="myTopnav">
    <a href="#home" class="active">Home</a>
    <a href="#news">News</a>
    <a href="#contact">Contact</a>
    <a href="#about">About</a>
    <a href="javascript:void(0);" class="icon" onclick="myFunction()">
      <i class="fa fa-bars"></i>
    </a>
  </div>
  
  
  <script>
  function myFunction() {
    var x = document.getElementById("myTopnav");
    if (x.className === "topnav") {
      x.className += " responsive";
    } else {
      x.className = "topnav";
    }
  }
  </script>
  
    <div class="row-2 content-grid bg-2">

        <div class="grid-item-1">

        </div>
        <div class="grid-item-1">

        </div>


    </div>
    
    <!-- Footer  -->

    <div class="footer">
        <p>Footer</p>
      </div>

</body>
</html>
