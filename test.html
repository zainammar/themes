<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body{
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #111;
  }
  .content{
    height: 400px;
    width: 750px;
    overflow: hidden;
    box-shadow: 1px 1px 25px rgba(0,0,0,0.5);
    border-radius: 12px;
    position: relative;
  }
  .content .images{
    height: 100%;
    width: 100%;
    position: relative;
  }
  .images img{
    height: 100%;
    width: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transform: scale(1);
    transition: opacity 1.2s ease-in-out, transform 8s ease;
  }
  .images img.active{
    opacity: 1;
    transform: scale(1.1); /* Ken Burns zoom */
    z-index: 1;
  }
</style>

<script>
  var indexValue = 0;
  const img = document.querySelectorAll(".images img");
  
  function slideShow(){
    img.forEach(img => img.classList.remove("active"));
    indexValue++;
    if(indexValue > img.length){indexValue = 1}
    img[indexValue - 1].classList.add("active");
    setTimeout(slideShow, 3500);
  }
  slideShow();
</script>
</head>
<body>

<div class="hero-image">
  <div class="hero-text">
    <h1 style="font-size:50px">I am John Doe</h1>
    <p>And I'm a Photographer</p>
    <button>Hire me</button>
  </div>
</div>

<p>Page Content..</p>

</body>
</html>
